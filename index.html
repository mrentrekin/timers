<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Countdown Ring</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    svg {
      display: block;
      width: 280px;
      height: 280px;
    }

    .ring-track {
      fill: none;
      stroke: #e0e0e0;
      stroke-width: 10;
    }

    .ring-progress {
      fill: none;
      stroke: #111111;
      stroke-width: 10;
      stroke-linecap: round;
      stroke-dasharray: 753.98;
      stroke-dashoffset: 0;
      transform: rotate(-90deg);
      transform-origin: 50% 50%;
    }
  </style>
</head>
<body>
  <svg viewBox="0 0 280 280" xmlns="http://www.w3.org/2000/svg">
    <circle class="ring-track" cx="140" cy="140" r="120" />
    <circle class="ring-progress" id="ring" cx="140" cy="140" r="120" />
  </svg>

  <script>
    const TOTAL = 300;
    const CIRC = 2 * Math.PI * 120;
    let remaining = TOTAL;
    const ring = document.getElementById('ring');

    function tick() {
      remaining--;
      ring.style.strokeDashoffset = CIRC * (1 - remaining / TOTAL);
      if (remaining > 0) setTimeout(tick, 1000);
    }

    setTimeout(tick, 1000);
  </script>
</body>
</html>
